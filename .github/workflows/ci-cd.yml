name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer PHP pour tests
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mysqli

      # 3️⃣ Vérifier la syntaxe PHP
      - name: PHP Syntax Check
        run: |
          find . -type f -name "*.php" -exec php -l {} \;

      # 4️⃣ Installer Docker pour builder
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 5️⃣ Build l'image Docker
      - name: Build Docker Image
        run: |
          docker build -t gestion-demandes-app .

      # 6️⃣ (Optionnel) Push Docker Image
